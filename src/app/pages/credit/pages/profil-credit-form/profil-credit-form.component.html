<section class="profile-page">
    <div class="container">
      <div class="top-actions">
        <button type="button" class="back-btn" (click)="goToCreditHome()">
          Back to Credit Space
        </button>
      </div>
  
      <div class="page-header">
        <div class="header-badge">Credit Profile</div>
        <h1>Complete your credit profile</h1>
        <p>
          You must complete this profile before submitting a new credit request.
        </p>
      </div>
  
      <div *ngIf="loading()" class="message info">Loading your profile...</div>
      <div *ngIf="error()" class="message error">{{ error() }}</div>
      <div *ngIf="success()" class="message success">{{ success() }}</div>
  
      <form class="profile-card" [formGroup]="form" (ngSubmit)="submit()" *ngIf="!loading()">
        <div class="section-title">
          <h2>Personal and financial information</h2>
          <p>
            These values will be used later for credit risk prediction and credit analysis.
          </p>
        </div>
  
        <div class="form-grid">
          <div class="form-field">
            <label>Age</label>
            <input type="number" formControlName="personAge" />
          </div>
  
          <div class="form-field">
            <label>Annual income</label>
            <input type="number" formControlName="personIncomeAnnual" />
          </div>
  
          <div class="form-field">
            <label>Home ownership</label>
            <select formControlName="personHomeOwnership">
              <option [ngValue]="null">Select...</option>
              <option *ngFor="let option of homeOwnershipOptions" [ngValue]="option">
                {{ option }}
              </option>
            </select>
          </div>
  
          <div class="form-field">
            <label>Employment length (years)</label>
            <input type="number" step="0.1" formControlName="personEmploymentLength" />
          </div>
  
          <div class="form-field">
            <label>Previous default on file</label>
            <select formControlName="previousDefaultOnFile">
              <option [ngValue]="null">Select...</option>
              <option *ngFor="let option of defaultOptions" [ngValue]="option">
                {{ option }}
              </option>
            </select>
          </div>
  
          <div class="form-field">
            <label>Credit history length</label>
            <input type="number" formControlName="creditHistoryLength" />
          </div>
  
          <div class="form-field">
            <label>Loan intent</label>
            <select formControlName="loanIntent">
              <option [ngValue]="null">Select...</option>
              <option *ngFor="let option of loanIntentOptions" [ngValue]="option">
                {{ option }}
              </option>
            </select>
          </div>
  
          <div class="form-field">
            <label>Monthly fixed charges</label>
            <input type="number" formControlName="monthlyFixedCharges" />
          </div>
  
          <div class="form-field">
            <label>Existing loan monthly payments</label>
            <input type="number" formControlName="existingLoanMonthlyPayments" />
          </div>
  
          <div class="form-field">
            <label>Outstanding old debt</label>
            <input type="number" formControlName="outstandingOldDebt" />
          </div>
  
          <div class="form-field">
            <label>Project start delay (months)</label>
            <input type="number" formControlName="projectStartDelayMonths" />
          </div>
  
          <div class="form-field">
            <label>Expected monthly revenue after start</label>
            <input type="number" formControlName="expectedMonthlyRevenueAfterStart" />
          </div>
        </div>
  
        <div class="checkbox-grid">
          <label class="check-item">
            <input type="checkbox" formControlName="hasExistingClients" />
            <span>Client already has existing clients</span>
          </label>
  
          <label class="check-item">
            <input type="checkbox" formControlName="needsGracePeriod" />
            <span>Client needs a grace period</span>
          </label>
        </div>
  
        <div class="actions">
          <button type="button" class="btn btn-light" (click)="goToHistory()">
            My Requests
          </button>
  
          <button type="submit" class="btn btn-primary" [disabled]="saving()">
            {{ saving() ? 'Saving...' : (profile() ? 'Update Profile' : 'Save Profile') }}
          </button>
  
          <button
            type="button"
            class="btn btn-dark"
            *ngIf="profile()"
            (click)="goToRequest()"
          >
            Continue to Credit Request
          </button>
        </div>
      </form>
    </div>
  </section>
